name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NIXPKGS_ALLOW_UNFREE: 1

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: fasttrackstudio
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - uses: Swatinem/rust-cache@v2
        with:
          cmd-format: nix develop .#ci --impure --command {0}

      - name: Run unit tests
        run: nix develop .#ci --impure --command daw-test

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Allow unprivileged user namespaces (bwrap needs this)
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: fasttrackstudio
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - uses: Swatinem/rust-cache@v2
        with:
          cmd-format: nix develop .#ci --impure --command {0}

      - name: Run integration tests
        run: nix develop .#ci --impure --command daw-integration

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Allow unprivileged user namespaces
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: fasttrackstudio
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build daw-bridge
        run: nix build .#daw-bridge --no-link --print-out-paths | tee /tmp/bridge-path

      - name: Build reaper-launcher
        run: nix build .#reaper-launcher --no-link --print-out-paths | tee /tmp/launcher-path

      - name: Push to Cachix
        run: |
          cachix push fasttrackstudio $(cat /tmp/bridge-path) || true
          cachix push fasttrackstudio $(cat /tmp/launcher-path) || true
        continue-on-error: true
