name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NIXPKGS_ALLOW_UNFREE: 1

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: fasttrackstudio
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-test-

      - name: Run unit tests
        run: nix develop .#ci --impure --command cargo test --workspace

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Allow unprivileged user namespaces (bwrap needs this)
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: fasttrackstudio
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Smoke test — REAPER starts headless
        run: |
          nix develop .#ci --impure --command bash -c '
            fts-test bash -c "
              \"\$FTS_REAPER_EXECUTABLE\" -newinst -nosplash -ignoreerrors &
              RPID=\$!
              sleep 3
              if kill -0 \$RPID 2>/dev/null; then
                echo \"REAPER running (PID \$RPID) — smoke test passed\"
                kill \$RPID
              else
                echo \"REAPER failed to start\"
                exit 1
              fi
            "
          '

