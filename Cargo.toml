[workspace]
members = [
    "apps/daw",
    "crates/audio-controls",
    "crates/daw",
    "crates/daw-control",
    "crates/daw-proto",
    "crates/daw-reaper",
    "crates/daw-standalone",
    "crates/dawfile-reaper",
    "crates/daw-ui",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["FastTrack Studio"]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Internal crates
daw-cli = { path = "apps/daw" }
audio-controls = { path = "crates/audio-controls" }
daw = { path = "crates/daw" }
daw-proto = { path = "crates/daw-proto" }
daw-control = { path = "crates/daw-control" }
daw-standalone = { path = "crates/daw-standalone" }
daw-reaper = { path = "crates/daw-reaper" }
daw-ui = { path = "crates/daw-ui" }
dawfile-reaper = { path = "crates/dawfile-reaper" }

# Facet reflection framework
facet = { git = "https://github.com/facet-rs/facet", branch = "main" }

# ROAM service framework (pinned — latest main needs peeps sub-crates not yet published)
roam = { git = "https://github.com/bearcove/roam.git", rev = "30a8e10" }
roam-session = { git = "https://github.com/bearcove/roam.git", rev = "30a8e10" }
roam-stream = { git = "https://github.com/bearcove/roam.git", rev = "30a8e10" }
roam-telemetry = { git = "https://github.com/bearcove/roam.git", rev = "30a8e10" }
roam-wire = { git = "https://github.com/bearcove/roam.git", rev = "30a8e10" }

# CLI
clap = { version = "4", features = ["derive"] }

# Sibling repos (local paths)
actions-proto = { path = "../input_actions/crates/actions-proto" }
keyflow = { path = "../keyflow/crates/keyflow" }
dock-dioxus = { path = "../dock-dioxus/crates/dock-dioxus", default-features = false }
dock-proto = { path = "../dock-dioxus/crates/dock-proto" }

# Testing
reaper-test = { path = "../FTS-Extensions/crates/reaper-test" }

# REAPER bindings
reaper-low = { git = "https://github.com/helgoboss/reaper-rs.git", branch = "master" }
reaper-medium = { git = "https://github.com/helgoboss/reaper-rs.git", branch = "master" }
reaper-high = { git = "https://github.com/helgoboss/reaper-rs.git", branch = "master" }

# UI
dioxus = "0.7.2"

# Async runtime
tokio = { version = "1.48", features = ["full"] }
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "2.0"
enumflags2 = "0.7"

# Observability
tracing = { version = "0.1", features = ["std"] }
peeps = { git = "https://github.com/bearcove/peeps", branch = "main", features = ["diagnostics"] }

# Utilities
eyre = "0.6"
uuid = { version = "1", features = ["v4", "v5", "v7", "serde"] }

[workspace.lints.rust]
dead_code = "allow"
unused = "allow"

[workspace.lints.clippy]
