[package]
name = "reaper-test"
version = "0.1.0"
edition = "2021"
description = "Runtime library for REAPER integration tests"

[dependencies]
daw = { workspace = true }
roam = { workspace = true }
roam-stream = { workspace = true }

eyre = "0.6"
tokio = { version = "1", features = ["time", "process", "rt", "rt-multi-thread", "net"] }
tracing = "0.1"

# Re-export the proc-macro so users can do `use reaper_test::reaper_test;`
reaper-test-macro = { path = "../reaper-test-macro" }
