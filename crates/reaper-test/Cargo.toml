[package]
name = "reaper-test"
version = "0.1.0"
edition = "2021"
description = "Runtime library for REAPER integration tests"

[features]
runner = ["dep:reaper-launcher"]

[dependencies]
daw = { workspace = true }
vox = { workspace = true }
vox-stream = { workspace = true }
moire.workspace = true
eyre = "0.6"
tokio = { version = "1", features = ["time", "process", "rt", "rt-multi-thread", "net"] }
tracing = "0.1"

# Re-export the proc-macro so users can do `use reaper_test::reaper_test;`
reaper-test-macro = { path = "../reaper-test-macro" }

# Runner deps (xtask only — not needed by test binaries)
reaper-launcher = { workspace = true, optional = true }
