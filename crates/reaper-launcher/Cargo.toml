[package]
name = "reaper-launcher"
version = "0.1.0"
edition = "2024"

[dependencies]
libc = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
resvg = { version = "0.44", optional = true }

[features]
icon-gen = ["resvg"]

[[bin]]
name = "reaper-launcher"
path = "src/main.rs"
